<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athletic Club - Parent Portal</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --light: #f8f9fa; --dark: #343a40; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #eef1f4; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #ccc; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .session-card { background: var(--light); border: 1px solid #e1e4e8; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-success { background: var(--success); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .status-badge { font-weight: 700; font-size: 14px; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        .status-open { background: #d4edda; color: #155724; }
        .status-full { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('register-tab')">1. Register & Add Profile</button>
        <button class="tab-btn" onclick="switchTab('booking-tab')">2. Book Sessions</button>
    </div>

    <div id="register-tab" class="tab-content active">
        <h2>Parent Registration</h2>
        <div class="form-group">
            <label>Email Address:</label>
            <input type="email" id="parentEmail" placeholder="parent@example.com">
        </div>
        <div class="form-group">
            <label>Postcode:</label>
            <input type="text" id="parentPostcode" placeholder="e.g. LS1 1UR">
        </div>
        <button class="btn" onclick="registerParent()">Register Account</button>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

        <h2>Add a Child Profile</h2>
        <div class="form-group">
            <label>Active Parent ID:</label>
            <input type="text" id="activeParentId" readonly placeholder="Will populate automatically after registering">
        </div>
        <div class="form-group">
            <label>Child's Full Name:</label>
            <input type="text" id="childName" placeholder="First and Last name">
        </div>
        <div class="form-group">
            <label>Date of Birth:</label>
            <input type="date" id="childDob">
        </div>
        <div class="form-group">
            <label>Gender:</label>
            <select id="childGender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Ability Level:</label>
            <select id="childAbility">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
        </div>
        <button class="btn btn-success" onclick="addChild()">Add Child to Profile</button>
    </div>

    <div id="booking-tab" class="tab-content">
        <h2>Book Training Session</h2>
        <div class="form-group">
            <label>Child ID to Book For:</label>
            <input type="text" id="bookingChildId" placeholder="Paste the generated Child ID here">
        </div>
        <h3>Available Weekly Sessions</h3>
        <div id="sessionContainer"></div>
    </div>
</div>

<script>
    // Automatically routes to localhost or your live Azure API
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? 'http://localhost:8000/api' 
        : 'https://club-booking-api.azurewebsites./api';

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        if(tabId === 'booking-tab') fetchSessions();
    }

    async function registerParent() {
        const email = document.getElementById('parentEmail').value;
        const postcode = document.getElementById('parentPostcode').value;
        
        const response = await fetch(`${API_BASE_URL}/register-parent`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: email, postcode: postcode })
        });
        const data = await response.json();
        if(response.ok) {
            document.getElementById('activeParentId').value = data.parent_id;
            alert("Parent profile registered! Copy your ID below to add children.");
        } else {
            alert("Error: " + data.detail);
        }
    }

    async function addChild() {
        const parentId = document.getElementById('activeParentId').value;
        const name = document.getElementById('childName').value;
        const dob = document.getElementById('childDob').value;
        const gender = document.getElementById('childGender').value;
        const ability = document.getElementById('childAbility').value;

        if(!parentId) return alert("Please register a parent profile first.");

        const response = await fetch(`${API_BASE_URL}/add-child`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ parent_id: parentId, full_name: name, dob: dob, gender: gender, ability_level: ability })
        });
        if(response.ok) {
            alert("Child registered successfully!");
        } else {
            const data = await response.json();
            alert("Error: " + data.detail);
        }
    }

    async function fetchSessions() {
        const response = await fetch(`${API_BASE_URL}/sessions-status`);
        const sessions = await response.json();
        const container = document.getElementById('sessionContainer');
        container.innerHTML = ''; 

        sessions.forEach(session => {
            const card = document.createElement('div');
            card.className = 'session-card';
            card.innerHTML = `
                <div>
                    <strong>${session.group} Training</strong><br>
                    <span>Date: ${session.date}</span><br>
                    <span class="status-badge ${session.is_full ? 'status-full' : 'status-open'}">
                        ${session.is_full ? 'Full' : `${session.spaces_left} Slots Left`}
                    </span>
                </div>
                <button class="btn" ${session.is_full ? 'disabled' : ''} onclick="executeBooking('${session.id}')">
                    ${session.is_full ? 'Sold Out' : 'Book Now'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    async function executeBooking(sessionId) {
        const childId = document.getElementById('bookingChildId').value;
        if(!childId) return alert("Please input a valid Child ID to assign this booking.");

        const response = await fetch(`${API_BASE_URL}/book`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ child_id: childId, session_id: sessionId })
        });
        const result = await response.json();
        if (response.ok) {
            alert("Success! Space reserved.");
            fetchSessions();
        } else {
            alert(`Failed: ${result.detail}`);
        }
    }
</script>
</body>
</html>
